<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel Demo - WorkBuddy 部署测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <header class="hero">
      <div class="badge">Deploy Demo</div>
      <h1>WorkBuddy <span class="highlight">→</span> GitHub <span class="highlight">→</span> Vercel</h1>
      <p class="subtitle">一键部署测试，从代码编写到生产上线全链路验证</p>
    </header>

    <!-- Status Cards -->
    <section class="cards">
      <div class="card" style="--color: #378ADD">
        <div class="card-icon">1</div>
        <h3>WorkBuddy 写代码</h3>
        <p>AI 智能体自动生成项目代码</p>
        <div class="card-status done">Done</div>
      </div>
      <div class="card" style="--color: #7F77DD">
        <div class="card-icon">2</div>
        <h3>GitHub 仓库</h3>
        <p>推送代码到远程仓库</p>
        <div class="card-status done">Done</div>
      </div>
      <div class="card" style="--color: #1D9E75">
        <div class="card-icon">3</div>
        <h3>Vercel 部署</h3>
        <p>自动化构建与生产发布</p>
        <div class="card-status done">Done</div>
      </div>
      <div class="card" style="--color: #BA7517">
        <div class="card-icon">4</div>
        <h3>自定义域名</h3>
        <p>绑定生产域名，全球 CDN</p>
        <div class="card-status" style="color: var(--color-text-tertiary);">Optional</div>
      </div>
    </section>

    <!-- Info Panel -->
    <section class="info">
      <div class="info-header">
        <h2>部署信息</h2>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">项目</span>
          <span class="info-value">vercel-demo</span>
        </div>
        <div class="info-item">
          <span class="info-label">框架</span>
          <span class="info-value">Vanilla HTML/CSS</span>
        </div>
        <div class="info-item">
          <span class="info-label">状态</span>
          <span class="info-value status-ok">运行中</span>
        </div>
        <div class="info-item">
          <span class="info-label">时间</span>
          <span class="info-value" id="timestamp">--</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p>Powered by <strong>WorkBuddy</strong> · Deployed via <strong>Vercel</strong></p>
    </footer>
  </div>

  <script>
    document.getElementById('timestamp').textContent = new Date().toLocaleString('zh-CN', {
      timeZone: 'Asia/Shanghai'
    });
  </script>
</body>
</html>
